# yaml-language-server: $schema=./node_modules/@jackyzha0/quartz/quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: WorldModel
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: en-US
  baseUrl: kabutojira.github.io/worldmodel
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#f8fafc"
        lightgray: "#e2e8f0"
        gray: "#94a3b8"
        darkgray: "#334155"
        dark: "#0f172a"
        secondary: "#0f766e"
        tertiary: "#2563eb"
        highlight: rgba(37, 99, 235, 0.12)
        textHighlight: "#fef08a88"
      darkMode:
        light: "#020617"
        lightgray: "#1e293b"
        gray: "#64748b"
        darkgray: "#cbd5e1"
        dark: "#f8fafc"
        secondary: "#5eead4"
        tertiary: "#60a5fa"
        highlight: rgba(96, 165, 250, 0.16)
        textHighlight: "#fde04755"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
      display: desktop-only
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: false
    order: 80
  - source: github:quartz-community/fonts
    enabled: true
    order: 85
  - source: github:quartz-community/remove-draft
    enabled: true
    order: 90
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    options:
      localGraph:
        drag: true
        zoom: true
        depth: 1
        scale: 1.0
        repelForce: 0.45
        centerForce: 0.25
        linkDistance: 26
        fontSize: 0.7
        opacityScale: 0.9
        removeTags: []
        showTags: false
        enableRadial: false
      globalGraph:
        drag: true
        zoom: true
        depth: -1
        scale: 0.75
        repelForce: 0.42
        centerForce: 0.22
        linkDistance: 22
        fontSize: 0.55
        opacityScale: 0.85
        removeTags: []
        showTags: false
        focusOnHover: true
        enableRadial: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
      condition: has-backlinks
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        Repository: https://github.com/Kabutojira/worldmodel
        Source index: https://github.com/Kabutojira/worldmodel/blob/main/index.md
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      wrap: wrap
      gap: 0.5rem
  byPageType:
    content: {}
    folder:
      positions:
        right: []
    tag:
      positions:
        right: []
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
